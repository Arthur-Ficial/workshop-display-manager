name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build DocC
        run: |
          swift package --allow-writing-to-directory ./_site \
            generate-documentation --target WDMCore --target WDMCLI --target WDMSystem \
            --output-path ./_site \
            --transform-for-static-hosting \
            --hosting-base-path workshop-display-manager

      - name: Upload DocC archive
        uses: actions/upload-artifact@v4
        with:
          name: docc-site
          path: ./_site
          retention-days: 14
